# Named skill-selector bundles. NOT the authoritative orchestration spec —
# that's `.bender/pipeline.yaml`. This file is kept for pattern/tag-based
# reusable skill references (e.g., fanning out over `bg-sentinel-*`).
# `/ghu` walks the pipeline, not these groups.

groups:
  pre-implementation-checks:
    description: "Validations run before crafter begins writing code (e.g., data-model and api-contract checks)."
    select:
      tags:
        any_of: [check, validation]
      context: [bg]
    ordered: false
    halt_on_failure: false

  security-sweep:
    description: "Post-implementation security sweep run by sentinel during /ghu (static + runtime checks)."
    select:
      patterns: ["bg-sentinel-*"]
    ordered: true
    halt_on_failure: false

  tdd-cycle:
    description: "TDD mode — Scaffold → Implement → Verify. Tester first (writes commented-out test stubs from the approved /tdd scaffolds), crafter second (implements and activates the assertions), tester third (runs the suite; must be green). /ghu walks this group when .bender/artifacts/plan/tests/ has approved scaffolds."
    select:
      explicit:
        - bg-tester-scaffold
        - bg-crafter-implement
        - bg-tester-run
    ordered: true
    halt_on_failure: true

  plain-cycle:
    description: "Plain mode — crafter implements and tester authors+runs its own tests in parallel. /ghu walks this group when no /tdd scaffolds are approved."
    select:
      explicit:
        - bg-crafter-implement
        - bg-tester-write-and-run
    ordered: false
    halt_on_failure: false

  review-sweep:
    description: "Read-only review fan-out — reviewer, sentinel, and benchmarker run in parallel on the change set. Scribe is intentionally excluded because its inline-comment edits touch the same source files the review trio is reading, and parallel read/write on identical paths is a race. /ghu walks this group after the tdd-cycle or plain-cycle group completes."
    select:
      patterns: ["bg-reviewer-*", "bg-sentinel-*", "bg-benchmarker-*"]
    ordered: false
    halt_on_failure: false

  docs-sweep:
    description: "Docs + inline-comments pass. Scribe updates `**/*.md`, README/CHANGELOG, and opens source comment blocks. Runs AFTER review-sweep (serially) so its source edits don't race reviewer/sentinel/benchmarker reads."
    select:
      patterns: ["bg-scribe-*"]
    ordered: true
    halt_on_failure: false
